# U-Boot config fragment for LS1046A secure boot

# NXP Chain of Trust
CONFIG_CHAIN_OF_TRUST=y
CONFIG_CMD_ESBC_VALIDATE=y

# FIT signature verification (ENFORCED)
CONFIG_FIT_SIGNATURE=y
CONFIG_FIT_FULL_CHECK=y
CONFIG_FIT_SIGNATURE_ENFORCE=y
CONFIG_RSA=y
CONFIG_RSA_VERIFY=y

# CAAM crypto engine
CONFIG_FSL_CAAM=y
CONFIG_SYS_FSL_SEC_COMPAT=4
CONFIG_SYS_FSL_SEC_LE=y
CONFIG_CMD_BLOB=y

# Redundant environment
CONFIG_SYS_REDUNDAND_ENVIRONMENT=y

# Production: uncomment to lock U-Boot console
# CONFIG_AUTOBOOT_KEYED=y
# CONFIG_AUTOBOOT_STOP_STR="your-production-secret"
# CONFIG_AUTOBOOT_KEYED_CTRLC=n
