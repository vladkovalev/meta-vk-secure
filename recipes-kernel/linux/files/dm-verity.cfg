# Kernel config fragment for dm-verity and dm-crypt

# Device Mapper core
CONFIG_BLK_DEV_DM=y
CONFIG_DM_INIT=y

# dm-verity: rootfs integrity
CONFIG_DM_VERITY=y
CONFIG_DM_VERITY_VERIFY_ROOTHASH_SIG=y
CONFIG_DM_VERITY_FEC=y

# dm-crypt: LUKS data encryption
CONFIG_DM_CRYPT=y

# Crypto algorithms
CONFIG_CRYPTO_SHA256=y
CONFIG_CRYPTO_AES=y
CONFIG_CRYPTO_XTS=y
CONFIG_CRYPTO_ECB=y
CONFIG_CRYPTO_CBC=y

# IMA/EVM (optional, uncomment if needed)
# CONFIG_INTEGRITY=y
# CONFIG_IMA=y
# CONFIG_EVM=y
